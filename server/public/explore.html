<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>explore · codeshare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#07090f;--bg2:#0d1117;--bg3:#161b22;--border:#1c2128;--border2:#30363d;
      --text:#e6edf3;--muted:#8b949e;--dim:#484f58;--blue:#58a6ff;--green:#3fb950;--red:#f85149;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}
    nav{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-text{color:var(--text);font-weight:800;font-size:15px;letter-spacing:-.5px;}
    .logo-text span{color:var(--blue);}
    .nav-links{display:flex;gap:4px;align-items:center;}
    .nav-links a,.nav-links button{color:var(--muted);text-decoration:none;font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:inherit;transition:all .15s;}
    .nav-links a:hover,.nav-links button:hover{color:var(--text);border-color:var(--border2);background:var(--bg3);}
    .nav-links a.active{color:var(--blue);border-color:var(--border);background:var(--bg3);}

    .page-header{padding:36px 28px 0;max-width:1100px;margin:0 auto;}
    .page-header h1{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:6px;}
    .page-header p{color:var(--dim);font-size:12px;}

    .toolbar{
      max-width:1100px;margin:24px auto 0;padding:0 28px;
      display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    }
    .search-wrap{flex:1;min-width:200px;position:relative;}
    .search-wrap input{
      width:100%;background:var(--bg2);border:1px solid var(--border2);
      color:var(--text);padding:9px 14px 9px 36px;border-radius:8px;
      font-family:inherit;font-size:13px;outline:none;transition:border-color .15s;
    }
    .search-wrap input:focus{border-color:var(--blue);}
    .search-wrap .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;}
    select{
      background:var(--bg2);border:1px solid var(--border2);color:var(--muted);
      padding:9px 12px;border-radius:8px;font-family:inherit;font-size:12px;outline:none;cursor:pointer;
    }
    select option{background:var(--bg2);}

    .container{max-width:1100px;margin:0 auto;padding:20px 28px 80px;}
    .results-info{font-size:12px;color:var(--dim);margin-bottom:16px;}

    /* list layout */
    .list{display:flex;flex-direction:column;gap:8px;}
    .item{
      background:var(--bg2);border:1px solid var(--border);border-radius:10px;
      padding:16px 20px;cursor:pointer;transition:all .15s;text-decoration:none;display:flex;
      align-items:flex-start;gap:16px;
    }
    .item:hover{border-color:var(--border2);background:var(--bg3);}
    .item-left{flex:1;min-width:0;}
    .item-title-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
    .item-title{color:var(--blue);font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .badge{background:var(--bg3);color:var(--dim);padding:2px 7px;border-radius:4px;font-size:10px;border:1px solid var(--border);flex-shrink:0;}
    .item-desc{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:8px;}
    .item-meta{display:flex;gap:14px;font-size:11px;color:var(--dim);}
    .item-preview{
      background:var(--bg);border:1px solid var(--border);border-radius:6px;
      padding:10px 14px;font-size:11px;color:#7d8590;line-height:1.6;
      width:260px;flex-shrink:0;overflow:hidden;max-height:72px;white-space:pre;
    }

    /* pagination */
    .pagination{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:32px;}
    .page-btn{
      background:var(--bg2);border:1px solid var(--border2);color:var(--muted);
      padding:7px 14px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:12px;
      transition:all .15s;
    }
    .page-btn:hover{border-color:var(--blue);color:var(--blue);}
    .page-btn.current{background:var(--bg3);border-color:var(--border2);color:var(--text);}
    .page-btn:disabled{opacity:.3;cursor:default;}
    .page-info{font-size:12px;color:var(--dim);padding:0 8px;}

    #empty{text-align:center;padding:60px;color:var(--dim);font-size:13px;display:none;}
    .skeleton{background:var(--bg3);border-radius:10px;height:80px;animation:pulse 1.5s ease infinite;}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

    .toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;transform:translateY(8px);}
    .toast.show{opacity:1;transform:none;pointer-events:all;}
    .toast.ok{background:var(--green);color:#000;}
    .toast.err{background:var(--red);color:#fff;}
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <span style="font-size:20px">⟨/⟩</span>
    <span class="logo-text">code<span>share</span></span>
  </a>
  <div class="nav-links">
    <a href="index.html">home</a>
    <a href="explore.html" class="active">explore</a>
    <div id="user-nav"></div>
  </div>
</nav>

<div class="page-header">
  <h1># explore</h1>
  <p>browse all public snippets</p>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="ico">⌕</span>
    <input id="search" placeholder="search by title, language, author..." oninput="onSearch()"/>
  </div>
  <select id="lang-filter" onchange="onSearch()">
    <option value="">all languages</option>
    <option>javascript</option><option>typescript</option><option>python</option>
    <option>rust</option><option>go</option><option>java</option><option>c</option>
    <option>cpp</option><option>php</option><option>bash</option><option>html</option>
    <option>css</option><option>sql</option><option>json</option>
  </select>
  <select id="sort" onchange="reload()">
    <option value="newest">newest first</option>
    <option value="most-viewed">most viewed</option>
  </select>
</div>

<div class="container">
  <div class="results-info" id="results-info"></div>
  <div class="list" id="list"></div>
  <div id="empty">no snippets found</div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let allData = [], currentPage = 1, totalPages = 1, totalCount = 0, searchTimer;

const escape = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const user = () => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } }

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2800);
}

function makeItem(s) {
  const lines = s.code.split('\n').length;
  const preview = escape(s.code.split('\n').slice(0,4).join('\n'));
  return `
    <a class="item" href="snippet.html#${s.slug}">
      <div class="item-left">
        <div class="item-title-row">
          <div class="item-title">${escape(s.title)}</div>
          <div class="badge">${s.language}</div>
        </div>
        <div class="item-desc">${escape((s.description||'').slice(0,100))}${(s.description||'').length>100?'…':''}</div>
        <div class="item-meta">
          <span>@${escape(s.author?.username||'?')}</span>
          <span>📄 ${lines} ln</span>
          <span>👁 ${s.views}</span>
          <span>${new Date(s.createdAt).toLocaleDateString()}</span>
        </div>
      </div>
      <div class="item-preview">${preview}</div>
    </a>`;
}

function showSkeletons() {
  document.getElementById('list').innerHTML = Array(8).fill('<div class="skeleton"></div>').join('');
}

async function load(pg=1) {
  currentPage = pg;
  showSkeletons();
  const q = document.getElementById('search').value.trim();
  try {
    const r = await fetch(`${API}/snippets?page=${pg}&limit=15`);
    const d = await r.json();
    allData = d.snippets;
    totalCount = d.total;
    totalPages = d.pages;
    render();
  } catch(e) { toast('Failed to load','err'); }
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => render(), 200);
}

function reload() { load(1); }

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const lang = document.getElementById('lang-filter').value;
  let data = allData;
  if(q) data = data.filter(s =>
    s.title.toLowerCase().includes(q) ||
    (s.description||'').toLowerCase().includes(q) ||
    s.language.toLowerCase().includes(q) ||
    s.author?.username.toLowerCase().includes(q)
  );
  if(lang) data = data.filter(s => s.language === lang);
  if(document.getElementById('sort').value === 'most-viewed') {
    data = [...data].sort((a,b) => b.views - a.views);
  }

  document.getElementById('results-info').textContent =
    `showing ${data.length} of ${totalCount} snippets`;
  document.getElementById('list').innerHTML = data.length ? data.map(makeItem).join('') : '';
  document.getElementById('empty').style.display = data.length ? 'none' : 'block';
  renderPagination();
}

function renderPagination() {
  const el = document.getElementById('pagination');
  if(totalPages <= 1) { el.innerHTML=''; return; }
  let html = `<button class="page-btn" onclick="load(${currentPage-1})" ${currentPage===1?'disabled':''}>← prev</button>`;
  html += `<span class="page-info">page ${currentPage} of ${totalPages}</span>`;
  html += `<button class="page-btn" onclick="load(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>next →</button>`;
  el.innerHTML = html;
}

function updateNavUser() {
  const u = user();
  const nav = document.getElementById('user-nav');
  nav.innerHTML = u
    ? `<a href="new.html" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;background:#3fb950;color:#000;text-decoration:none;border:1px solid #3fb950">+ new</a>
       <a href="profile.html" style="color:var(--muted);text-decoration:none;font-size:12px;padding:5px 12px;border-radius:6px">@${u.username}</a>`
    : `<a href="index.html" style="color:var(--muted);font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid transparent;text-decoration:none;background:transparent">login</a>`;
}

updateNavUser();
load(1);
</script>
</body>
</html>
