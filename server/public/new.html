<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>new snippet · codeshare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#07090f;--bg2:#0d1117;--bg3:#161b22;--border:#1c2128;--border2:#30363d;--text:#e6edf3;--muted:#8b949e;--dim:#484f58;--blue:#58a6ff;--green:#3fb950;--red:#f85149;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}
    nav{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-text{color:var(--text);font-weight:800;font-size:15px;letter-spacing:-.5px;}
    .logo-text span{color:var(--blue);}
    .nav-links{display:flex;gap:4px;align-items:center;}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid transparent;transition:all .15s;}
    .nav-links a:hover{color:var(--text);border-color:var(--border2);background:var(--bg3);}

    .container{max-width:900px;margin:0 auto;padding:32px 24px 80px;}
    .page-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
    .page-sub{color:var(--dim);font-size:12px;margin-bottom:28px;}

    .form-grid{display:grid;grid-template-columns:1fr 180px;gap:12px;margin-bottom:12px;}
    .form-row{margin-bottom:12px;}
    label{display:block;font-size:11px;color:var(--dim);margin-bottom:6px;letter-spacing:.5px;}

    input, select, textarea {
      width:100%;background:var(--bg2);border:1px solid var(--border2);
      color:var(--text);padding:10px 14px;border-radius:8px;
      font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;
      transition:border-color .15s;
    }
    input:focus, select:focus, textarea:focus{border-color:var(--blue);}
    textarea{resize:vertical;min-height:420px;line-height:22px;tab-size:2;}
    select option{background:var(--bg2);}

    /* editor wrapper */
    .editor-wrap{position:relative;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden;transition:border-color .15s;}
    .editor-wrap:focus-within{border-color:var(--blue);}
    .editor-top{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg3);}
    .editor-lang-badge{font-size:11px;color:var(--dim);}
    .editor-hint{font-size:10px;color:var(--dim);}
    .editor-body{display:flex;}
    .line-nums{background:rgba(0,0,0,.25);padding:14px 0;user-select:none;min-width:44px;}
    .line-nums span{display:block;padding:0 12px;color:var(--dim);font-size:12px;line-height:22px;text-align:right;}
    textarea#code{
      border:none;border-radius:0;background:transparent;padding:14px;
      flex:1;min-height:400px;line-height:22px;resize:none;
    }
    textarea#code:focus{outline:none;border-color:transparent;}

    .char-count{font-size:11px;color:var(--dim);text-align:right;margin-top:4px;}

    .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;align-items:center;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;}
    .btn:hover{border-color:var(--blue);color:var(--text);}
    .btn-create{background:var(--green);border-color:var(--green);color:#000;}
    .btn-create:hover{opacity:.85;border-color:var(--green);}
    .btn-create:disabled{opacity:.5;cursor:not-allowed;}

    /* preview panel */
    .preview-toggle{font-size:12px;color:var(--blue);cursor:pointer;text-decoration:underline;}
    .preview-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-top:16px;display:none;}
    .preview-panel.open{display:block;}
    .preview-panel h3{font-size:14px;color:var(--muted);margin-bottom:12px;}

    /* login gate */
    #login-gate{text-align:center;padding:80px;display:none;}
    #login-gate h2{font-size:22px;font-weight:800;margin-bottom:10px;}
    #login-gate p{color:var(--dim);font-size:13px;margin-bottom:24px;}

    .toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;transform:translateY(8px);}
    .toast.show{opacity:1;transform:none;pointer-events:all;}
    .toast.ok{background:var(--green);color:#000;}
    .toast.err{background:var(--red);color:#fff;}
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <span style="font-size:20px">⟨/⟩</span>
    <span class="logo-text">code<span>share</span></span>
  </a>
  <div class="nav-links">
    <a href="index.html">home</a>
    <a href="explore.html">explore</a>
    <a href="profile.html" id="profile-link" style="display:none"></a>
  </div>
</nav>

<div class="container">
  <!-- login gate -->
  <div id="login-gate">
    <h2>login required</h2>
    <p>you need to be logged in to create snippets</p>
    <a href="index.html" class="btn" style="border-color:var(--blue);color:var(--blue);display:inline-flex">go to login →</a>
  </div>

  <!-- form -->
  <div id="form-wrap">
    <div class="page-title">+ new snippet</div>
    <div class="page-sub">your code will be stored permanently and accessible via its own URL</div>

    <div class="form-grid">
      <div>
        <label>TITLE</label>
        <input id="title" placeholder="give it a descriptive name..." maxlength="120"/>
      </div>
      <div>
        <label>LANGUAGE</label>
        <select id="language">
          <option>javascript</option><option>typescript</option><option>python</option>
          <option>rust</option><option>go</option><option>java</option>
          <option>c</option><option>cpp</option><option>csharp</option><option>php</option>
          <option>ruby</option><option>swift</option><option>kotlin</option>
          <option>html</option><option>css</option><option>json</option>
          <option>yaml</option><option>bash</option><option>sql</option>
          <option>markdown</option><option>plaintext</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label>DESCRIPTION <span style="color:var(--dim)">(optional)</span></label>
      <input id="description" placeholder="what does this snippet do?" maxlength="300"/>
    </div>

    <div class="form-row">
      <label>CODE</label>
      <div class="editor-wrap">
        <div class="editor-top">
          <span class="editor-lang-badge" id="editor-lang-badge">javascript</span>
          <span class="editor-hint">tab = 2 spaces · ctrl+enter to submit</span>
        </div>
        <div class="editor-body">
          <div class="line-nums" id="line-nums"><span>1</span></div>
          <textarea id="code" placeholder="// paste your code here...
// tab key inserts spaces
// ctrl+enter submits" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="char-count"><span id="char-count">0</span> chars</div>
    </div>

    <div class="form-actions">
      <span id="saving-hint" style="font-size:12px;color:var(--dim);display:none">creating snippet…</span>
      <a href="index.html" class="btn">cancel</a>
      <button class="btn btn-create" id="submit-btn" onclick="submit()">create snippet →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
const token = () => localStorage.getItem('token');
const user = () => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } }

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2800);
}

// check auth
function init() {
  const u = user();
  if(!u || !token()) {
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('login-gate').style.display = '';
    return;
  }
  const pl = document.getElementById('profile-link');
  pl.textContent = `@${u.username}`;
  pl.style.display = '';
}

// line numbers
const codeEl = document.getElementById('code');
const lineNumsEl = document.getElementById('line-nums');

function updateLineNums() {
  const lines = codeEl.value.split('\n').length;
  lineNumsEl.innerHTML = Array.from({length:lines},(_,i)=>`<span>${i+1}</span>`).join('');
  document.getElementById('char-count').textContent = codeEl.value.length;
}

codeEl.addEventListener('input', updateLineNums);
codeEl.addEventListener('scroll', () => {
  lineNumsEl.style.marginTop = `-${codeEl.scrollTop}px`;
});

// tab key
codeEl.addEventListener('keydown', e => {
  if(e.key === 'Tab') {
    e.preventDefault();
    const s = e.target.selectionStart;
    const v = e.target.value;
    e.target.value = v.substring(0,s) + '  ' + v.substring(s);
    e.target.selectionStart = e.target.selectionEnd = s + 2;
    updateLineNums();
  }
  if(e.ctrlKey && e.key === 'Enter') submit();
});

// sync lang badge
document.getElementById('language').addEventListener('change', function() {
  document.getElementById('editor-lang-badge').textContent = this.value;
});

async function submit() {
  const title = document.getElementById('title').value.trim();
  const code = document.getElementById('code').value;
  const language = document.getElementById('language').value;
  const description = document.getElementById('description').value.trim();

  if(!title) { toast('title is required','err'); document.getElementById('title').focus(); return; }
  if(!code.trim()) { toast('code cannot be empty','err'); codeEl.focus(); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  document.getElementById('saving-hint').style.display = '';

  try {
    const r = await fetch(`${API}/snippets`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token()}`},
      body: JSON.stringify({title,code,language,description})
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error);
    toast('snippet created!');
    setTimeout(() => window.location.href = `snippet.html#${d.slug}`, 600);
  } catch(e) {
    toast(e.message,'err');
    btn.disabled = false;
    document.getElementById('saving-hint').style.display = 'none';
  }
}

init();
</script>
</body>
</html>
