<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>profile · codeshare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#07090f;--bg2:#0d1117;--bg3:#161b22;--border:#1c2128;--border2:#30363d;--text:#e6edf3;--muted:#8b949e;--dim:#484f58;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--purple:#bc8cff;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}
    nav{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-text{color:var(--text);font-weight:800;font-size:15px;letter-spacing:-.5px;}
    .logo-text span{color:var(--blue);}
    .nav-links{display:flex;gap:4px;align-items:center;}
    .nav-links a,.nav-links button{color:var(--muted);text-decoration:none;font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:inherit;transition:all .15s;}
    .nav-links a:hover,.nav-links button:hover{color:var(--text);border-color:var(--border2);background:var(--bg3);}
    .nav-links a.active{color:var(--blue);border-color:var(--border);background:var(--bg3);}

    .container{max-width:860px;margin:0 auto;padding:32px 24px 80px;}

    /* profile card */
    .profile-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:14px;
      padding:28px;margin-bottom:24px;
      background-image:radial-gradient(ellipse 60% 40% at 80% 20%, rgba(88,166,255,.05), transparent);
    }
    .profile-top{display:flex;align-items:center;gap:18px;margin-bottom:20px;}
    .avatar{
      width:64px;height:64px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:26px;font-weight:800;color:var(--text);flex-shrink:0;
      border:2px solid var(--border2);
    }
    .profile-info h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
    .profile-info .joined{font-size:12px;color:var(--dim);}
    .profile-stats{display:flex;gap:24px;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px;}
    .stat{text-align:center;}
    .stat-num{font-size:20px;font-weight:800;color:var(--text);}
    .stat-label{font-size:11px;color:var(--dim);margin-top:2px;}

    /* bio */
    .bio-wrap{display:flex;gap:10px;align-items:flex-start;}
    .bio-text{color:var(--muted);font-size:13px;line-height:1.6;flex:1;}
    .bio-text.empty{color:var(--dim);font-style:italic;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-family:inherit;font-size:12px;cursor:pointer;text-decoration:none;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;}
    .btn:hover{border-color:var(--blue);color:var(--text);}
    .bio-input{
      flex:1;background:var(--bg);border:1px solid var(--blue);color:var(--text);
      padding:8px 12px;border-radius:7px;font-family:inherit;font-size:13px;outline:none;
    }

    /* snippets */
    .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .section-title{font-size:13px;color:var(--dim);}
    .btn-new{background:var(--green);border-color:var(--green);color:#000;font-weight:700;}
    .btn-new:hover{opacity:.85;}

    .list{display:flex;flex-direction:column;gap:8px;}
    .item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;cursor:pointer;transition:all .15s;text-decoration:none;display:block;position:relative;}
    .item:hover{border-color:var(--border2);transform:translateY(-1px);}
    .item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px;}
    .item-title{color:var(--blue);font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .badge{background:var(--bg3);color:var(--dim);padding:2px 8px;border-radius:4px;font-size:10px;border:1px solid var(--border);flex-shrink:0;}
    .item-preview{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;color:#7d8590;line-height:1.6;overflow:hidden;max-height:52px;white-space:pre;margin-bottom:10px;}
    .item-meta{display:flex;gap:14px;font-size:11px;color:var(--dim);}
    .item-del{
      position:absolute;top:12px;right:12px;
      background:transparent;border:1px solid transparent;color:var(--dim);
      padding:4px 8px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:11px;
      transition:all .15s;display:none;
    }
    .item:hover .item-del{display:block;}
    .item-del:hover{border-color:var(--red);color:var(--red);background:rgba(248,81,73,.1);}

    /* empty */
    .empty{text-align:center;padding:50px;color:var(--dim);font-size:13px;}

    /* logout button */
    .btn-logout{border-color:var(--red) !important;color:var(--red) !important;}
    .btn-logout:hover{background:rgba(248,81,73,.1) !important;}

    #loading{text-align:center;padding:80px;color:var(--dim);}
    #login-gate{text-align:center;padding:80px;display:none;}
    #login-gate h2{font-size:20px;font-weight:800;margin-bottom:8px;}
    #login-gate p{color:var(--dim);font-size:13px;margin-bottom:20px;}

    .toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;transform:translateY(8px);}
    .toast.show{opacity:1;transform:none;pointer-events:all;}
    .toast.ok{background:var(--green);color:#000;}
    .toast.err{background:var(--red);color:#fff;}
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <span style="font-size:20px">⟨/⟩</span>
    <span class="logo-text">code<span>share</span></span>
  </a>
  <div class="nav-links">
    <a href="index.html">home</a>
    <a href="explore.html">explore</a>
    <a href="new.html" id="new-link" style="display:none">+ new</a>
    <a href="profile.html" class="active" id="profile-link" style="display:none"></a>
    <button onclick="logout()" class="btn-logout" id="logout-btn" style="display:none">logout</button>
  </div>
</nav>

<div class="container">
  <div id="loading">loading profile…</div>
  <div id="login-gate">
    <h2>not logged in</h2>
    <p>please login to view your profile</p>
    <a href="index.html" class="btn" style="border-color:var(--blue);color:var(--blue);display:inline-flex">go to login →</a>
  </div>

  <div id="main" style="display:none">
    <div class="profile-card">
      <div class="profile-top">
        <div class="avatar" id="avatar"></div>
        <div class="profile-info">
          <h1 id="username-display"></h1>
          <div class="joined" id="joined"></div>
        </div>
      </div>

      <div class="profile-stats">
        <div class="stat"><div class="stat-num" id="stat-count">0</div><div class="stat-label">snippets</div></div>
        <div class="stat"><div class="stat-num" id="stat-views">0</div><div class="stat-label">total views</div></div>
        <div class="stat"><div class="stat-num" id="stat-langs">0</div><div class="stat-label">languages</div></div>
      </div>

      <div id="bio-view" class="bio-wrap">
        <div class="bio-text empty" id="bio-text">no bio yet</div>
        <button class="btn" id="edit-bio-btn" onclick="startEditBio()" style="display:none">edit bio</button>
      </div>
      <div id="bio-edit" style="display:none" class="bio-wrap">
        <input class="bio-input" id="bio-input" placeholder="write a short bio..." maxlength="200"/>
        <button class="btn" onclick="saveBio()" style="border-color:var(--green);color:var(--green)">save</button>
        <button class="btn" onclick="cancelBio()">×</button>
      </div>
    </div>

    <div class="section-head">
      <span class="section-title" id="snippets-label">snippets</span>
      <a href="new.html" class="btn btn-new">+ new snippet</a>
    </div>

    <div class="list" id="snippets-list"></div>
    <div class="empty" id="empty" style="display:none">
      no snippets yet · <a href="new.html" style="color:var(--blue)">create your first one?</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
const token = () => localStorage.getItem('token');
const getUser = () => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } }

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2800);
}

const escape = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let profileData = null;
let isOwn = false;

function avatarColor(name) {
  let h = 0; for(let c of name) h = (h * 31 + c.charCodeAt(0)) % 360;
  return `hsl(${h}, 45%, 30%)`;
}

async function load() {
  const u = getUser();
  const hashUser = window.location.hash.slice(1);
  const targetUsername = hashUser || u?.username;

  if(!targetUsername) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login-gate').style.display = '';
    return;
  }

  isOwn = u && targetUsername === u.username;

  // update nav
  if(u) {
    document.getElementById('new-link').style.display = '';
    document.getElementById('profile-link').style.display = '';
    document.getElementById('profile-link').textContent = `@${u.username}`;
    document.getElementById('logout-btn').style.display = '';
  }

  try {
    const r = await fetch(`${API}/users/${targetUsername}`);
    if(!r.ok) throw new Error('user not found');
    profileData = await r.json();
    render();
  } catch(e) {
    toast(e.message,'err');
    document.getElementById('loading').textContent = 'user not found';
  }
}

function render() {
  const { user, snippets } = profileData;
  document.title = `@${user.username} · codeshare`;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = '';

  // avatar
  const av = document.getElementById('avatar');
  av.textContent = user.username[0].toUpperCase();
  av.style.background = avatarColor(user.username);

  document.getElementById('username-display').textContent = `@${user.username}`;
  document.getElementById('joined').textContent = `joined ${new Date(user.createdAt).toLocaleDateString()}`;

  // stats
  const totalViews = snippets.reduce((a,s)=>a+s.views,0);
  const langs = new Set(snippets.map(s=>s.language)).size;
  document.getElementById('stat-count').textContent = snippets.length;
  document.getElementById('stat-views').textContent = totalViews.toLocaleString();
  document.getElementById('stat-langs').textContent = langs;
  document.getElementById('snippets-label').textContent = `${snippets.length} snippet${snippets.length!==1?'s':''}`;

  // bio
  const bioText = document.getElementById('bio-text');
  if(user.bio) { bioText.textContent = user.bio; bioText.classList.remove('empty'); }
  else { bioText.textContent = 'no bio yet'; bioText.classList.add('empty'); }
  if(isOwn) document.getElementById('edit-bio-btn').style.display = '';

  // snippets
  const list = document.getElementById('snippets-list');
  if(!snippets.length) {
    list.innerHTML = '';
    document.getElementById('empty').style.display = '';
    return;
  }
  document.getElementById('empty').style.display = 'none';
  list.innerHTML = snippets.map(s => {
    const lines = s.code.split('\n').length;
    const preview = escape(s.code.split('\n').slice(0,3).join('\n'));
    return `
      <div class="item" onclick="window.location='snippet.html#${s.slug}'">
        <div class="item-top">
          <div class="item-title">${escape(s.title)}</div>
          <div class="badge">${s.language}</div>
        </div>
        <div class="item-preview">${preview}</div>
        <div class="item-meta">
          <span>📄 ${lines} lines</span>
          <span>👁 ${s.views} views</span>
          <span>${new Date(s.createdAt).toLocaleDateString()}</span>
          <span style="color:var(--blue);text-decoration:none">/snippets/${s.slug}</span>
        </div>
        ${isOwn ? `<button class="item-del" onclick="event.stopPropagation();deleteSnippet('${s.slug}',this)">✕ delete</button>` : ''}
      </div>`;
  }).join('');
}

function startEditBio() {
  document.getElementById('bio-input').value = profileData.user.bio || '';
  document.getElementById('bio-view').style.display = 'none';
  document.getElementById('bio-edit').style.display = 'flex';
  document.getElementById('bio-input').focus();
}
function cancelBio() {
  document.getElementById('bio-view').style.display = 'flex';
  document.getElementById('bio-edit').style.display = 'none';
}
async function saveBio() {
  const bio = document.getElementById('bio-input').value.trim();
  try {
    await fetch(`${API}/users/me/bio`, {
      method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token()}`},
      body: JSON.stringify({bio})
    });
    profileData.user.bio = bio;
    const bioText = document.getElementById('bio-text');
    bioText.textContent = bio || 'no bio yet';
    bio ? bioText.classList.remove('empty') : bioText.classList.add('empty');
    cancelBio();
    toast('bio updated!');
  } catch(e) { toast(e.message,'err'); }
}

async function deleteSnippet(slug, btn) {
  if(!confirm('delete this snippet?')) return;
  btn.textContent = '…';
  try {
    const r = await fetch(`${API}/snippets/${slug}`, {
      method:'DELETE', headers:{'Authorization':`Bearer ${token()}`}
    });
    if(!r.ok) throw new Error((await r.json()).error);
    profileData.snippets = profileData.snippets.filter(s=>s.slug!==slug);
    render();
    toast('deleted!');
  } catch(e) { toast(e.message,'err'); btn.textContent='✕ delete'; }
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  toast('logged out');
  setTimeout(() => window.location.href='index.html', 800);
}

load();
window.addEventListener('hashchange', load);
</script>
</body>
</html>
